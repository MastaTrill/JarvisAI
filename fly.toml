# Fly.io configuration for Jarvis AI
app = "jarvis-ai"
primary_region = "ord"

[build]
dockerfile = "Dockerfile"

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0

[[services]]
protocol = "tcp"
internal_port = 8080

[[services.ports]]
port = 80
handlers = ["http"]
force_https = true

[[services.ports]]
port = 443
handlers = ["tls", "http"]

[env]
JARVIS_ENV = "production"
LOG_LEVEL = "INFO"
PYTHON_VERSION = "3.11"

[checks]
  [checks.http]
  grace_period = "30s"
  interval = "30s"
  method = "get"
  protocol = "http"
  timeout = "5s"
  path = "/health"
